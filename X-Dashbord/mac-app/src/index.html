<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X-Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1c1c1e;
      --bg-secondary: #2c2c2e;
      --bg-tertiary: #3a3a3c;
      --bg-card: #2c2c2e;
      --bg-card-hover: #38383a;
      --accent-blue: #0a84ff;
      --accent-green: #30d158;
      --accent-purple: #bf5af2;
      --accent-orange: #ff9f0a;
      --text-primary: #ffffff;
      --text-secondary: #98989d;
      --text-tertiary: #636366;
      --separator: rgba(84, 84, 88, 0.36);
      --fill: rgba(120, 120, 128, 0.2);
    }

    body {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Inter', BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== macOS Window Titlebar ===== */
    .titlebar {
      height: 52px;
      background: rgba(28, 28, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--separator);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      position: relative;
      z-index: 100;
      flex-shrink: 0;
      padding-left: 78px;
    }

    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: -0.08px;
    }

    .titlebar .traffic-lights {
      position: absolute;
      left: 20px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .traffic-light {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 0.5px solid rgba(0, 0, 0, 0.12);
    }

    .traffic-light.red {
      background: #ff5f57;
    }

    .traffic-light.yellow {
      background: #febc2e;
    }

    .traffic-light.green {
      background: #28c840;
    }

    /* ===== Main Content ===== */
    #selection-page {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 50px;
      -webkit-app-region: no-drag;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), inset 0 0.5px 0 rgba(255, 255, 255, 0.06);
    }

    .app-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .app-subtitle {
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 40px;
    }

    /* ===== macOS Cards ===== */
    .cards-grid {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 600px;
    }

    .nav-card {
      flex: 1;
      background: var(--bg-card);
      border: 0.5px solid var(--separator);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .nav-card:hover {
      background: var(--bg-card-hover);
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .nav-card:active {
      transform: scale(0.98);
    }

    .card-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 14px;
    }

    .nav-card.server .card-icon-wrap {
      background: linear-gradient(135deg, #5e5ce6, #bf5af2);
    }

    .nav-card.dashboard .card-icon-wrap {
      background: linear-gradient(135deg, #30d158, #63e6be);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .card-url {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: var(--fill);
      border-radius: 5px;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-tertiary);
      font-family: 'SF Mono', 'Menlo', monospace;
    }

    .card-url .lock {
      font-size: 9px;
    }

    /* ===== Content Frame ===== */
    #dashboard-frame {
      display: none;
      flex: 1;
      width: 100%;
      border: none;
      background: var(--bg);
    }

    /* ===== macOS Bottom Toolbar ===== */
    .toolbar {
      height: 38px;
      background: rgba(28, 28, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--separator);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 11px;
      color: var(--text-secondary);
      z-index: 100;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .toolbar-btn {
      padding: 4px 10px;
      background: var(--fill);
      border: 0.5px solid var(--separator);
      border-radius: 5px;
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: -apple-system, 'SF Pro Text', sans-serif;
    }

    .toolbar-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .toolbar-btn:active {
      transform: scale(0.96);
    }

    .toolbar-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .toolbar-ver {
      font-size: 10px;
      color: var(--text-tertiary);
      padding: 2px 6px;
      background: var(--fill);
      border-radius: 4px;
    }

    /* ===== Animations ===== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nav-card:nth-child(1) {
      animation: fadeIn 0.35s ease-out;
    }

    .nav-card:nth-child(2) {
      animation: fadeIn 0.35s ease-out 0.08s both;
    }

    .app-icon {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>

<body>
  <div class="bg-animation" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;">
  </div>

  <!-- macOS Title Bar -->
  <div class="titlebar">
    <div class="traffic-lights">
      <div class="traffic-light red"></div>
      <div class="traffic-light yellow"></div>
      <div class="traffic-light green"></div>
    </div>
    <span class="titlebar-title" id="titlebar-text">X-Dashboard</span>
  </div>

  <!-- Selection Page -->
  <div id="selection-page">
    <div class="app-icon">📡</div>
    <div class="app-title">X-Dashboard</div>
    <div class="app-subtitle">EA Trading Monitor</div>

    <div class="cards-grid">
      <!-- Server Control -->
      <div class="nav-card server" onclick="openPage('server')">
        <div class="card-icon-wrap">🖥️</div>
        <div class="card-title">Server Control</div>
        <div class="card-desc">จัดการ X-Server<br>MT5 Connections, EA Update</div>
        <div class="card-url"><span class="lock">🔒</span> x-server.xea.dpdns.org</div>
      </div>

      <!-- Dashboard -->
      <div class="nav-card dashboard" onclick="openPage('dashboard')">
        <div class="card-icon-wrap">📊</div>
        <div class="card-title">EA Dashboard</div>
        <div class="card-desc">ดูข้อมูล EA, กราฟ P&L<br>สั่ง Close/Settings</div>
        <div class="card-url"><span class="lock">🔒</span> xea.dpdns.org</div>
      </div>
    </div>
  </div>

  <!-- Content iframe -->
  <iframe id="dashboard-frame"></iframe>

  <!-- macOS Bottom Toolbar -->
  <div class="toolbar">
    <span id="bottom-status">เลือกเมนู</span>
    <div class="toolbar-actions">
      <button class="toolbar-btn" onclick="refreshPage()">⟳ Refresh</button>
      <button class="toolbar-btn" onclick="goHome()">◀ Home</button>
      <span class="toolbar-ver">v1.5.0</span>
    </div>
  </div>

  <script>
    let currentPage = '';

    const URLS = {
      server: 'https://x-server.xea.dpdns.org',
      dashboard: 'https://xea.dpdns.org'
    };

    const LABELS = {
      server: 'Server Control',
      dashboard: 'EA Dashboard'
    };

    function openPage(type) {
      currentPage = type;
      document.getElementById('dashboard-frame').src = URLS[type];
      document.getElementById('dashboard-frame').style.display = 'block';
      document.getElementById('selection-page').style.display = 'none';
      document.getElementById('titlebar-text').textContent = LABELS[type];
      document.getElementById('bottom-status').textContent = LABELS[type];
    }

    function refreshPage() {
      if (currentPage) {
        const frame = document.getElementById('dashboard-frame');
        frame.src = frame.src;
      }
    }

    function goHome() {
      currentPage = '';
      document.getElementById('dashboard-frame').style.display = 'none';
      document.getElementById('dashboard-frame').src = '';
      document.getElementById('selection-page').style.display = 'flex';
      document.getElementById('titlebar-text').textContent = 'X-Dashboard';
      document.getElementById('bottom-status').textContent = 'เลือกเมนู';
    }

    document.addEventListener('keydown', (e) => {
      if (e.metaKey && e.key === 'r') { e.preventDefault(); refreshPage(); }
      if (e.key === 'Escape' && currentPage) { goHome(); }
    });
  </script>
</body>

</html>
