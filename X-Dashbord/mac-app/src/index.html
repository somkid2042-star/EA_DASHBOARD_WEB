<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X-Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --card-hover-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
      --green: #00c853;
      --green-bg: rgba(0, 200, 83, 0.08);
      --orange: #ff9100;
      --orange-bg: rgba(255, 145, 0, 0.08);
      --text: #1a1a2e;
      --text2: #6e6e80;
      --text3: #9e9eb0;
      --border: rgba(0, 0, 0, 0.06);
    }

    body {
      font-family: 'Inter', 'Prompt', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Top Bar ===== */
    .topbar {
      height: 44px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-app-region: drag;
      z-index: 100;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .topbar-ver {
      font-size: 11px;
      font-weight: 400;
      color: var(--text3);
    }

    /* ===== Main Content ===== */
    #main-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 40px;
      -webkit-app-region: no-drag;
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--green), #69f0ae);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      box-shadow: 0 4px 16px rgba(0, 200, 83, 0.2);
    }

    .header-logo svg {
      width: 28px;
      height: 28px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 13px;
      color: var(--text2);
      font-weight: 400;
    }

    /* ===== Cards ===== */
    .cards {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 560px;
    }

    .card {
      flex: 1;
      background: var(--card);
      border-radius: 16px;
      padding: 22px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--card-hover-shadow);
    }

    .card:active {
      transform: translateY(-1px);
    }

    .card-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .card-icon svg {
      width: 22px;
      height: 22px;
    }

    .card.server .card-icon {
      background: var(--orange-bg);
    }

    .card.dashboard .card-icon {
      background: var(--green-bg);
    }

    .card.server .card-icon svg {
      color: var(--orange);
    }

    .card.dashboard .card-icon svg {
      color: var(--green);
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .card.server .card-label {
      color: var(--orange);
    }

    .card.dashboard .card-label {
      color: var(--green);
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .card-url {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 10px;
      color: var(--text3);
      font-family: 'SF Mono', 'Menlo', monospace;
    }

    .card-url .lock-icon {
      color: var(--green);
    }

    .card-url .lock-icon svg {
      width: 10px;
      height: 10px;
      vertical-align: middle;
    }

    /* ===== Status ===== */
    .status-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text2);
      font-weight: 500;
      background: #fff;
      padding: 5px 12px;
      border-radius: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 4px var(--green);
    }

    /* ===== Content Frame ===== */
    #content-frame {
      display: none;
      flex: 1;
      width: 100%;
      border: none;
      background: var(--bg);
    }

    /* ===== Bottom Bar ===== */
    .bottombar {
      height: 36px;
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .bottombar-status {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
    }

    .bottombar-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn-bar {
      padding: 4px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .btn-bar:hover {
      background: #e8e8ee;
      color: var(--text);
    }

    .ver-tag {
      font-size: 10px;
      color: var(--text3);
    }

    /* ===== Animations ===== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      animation: fadeUp 0.35s ease-out;
    }

    .card:nth-child(1) {
      animation: fadeUp 0.35s ease-out 0.08s both;
    }

    .card:nth-child(2) {
      animation: fadeUp 0.35s ease-out 0.15s both;
    }

    .status-row {
      animation: fadeUp 0.35s ease-out 0.22s both;
    }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <span class="topbar-title" id="topbar-text">Dashboard</span>
    <span class="topbar-ver">v1.5.0</span>
  </div>

  <!-- Main Page -->
  <div id="main-page">
    <div class="header">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2 L12 22" />
          <path d="M2 12 L22 12" />
          <path d="M4.93 4.93 L19.07 19.07" />
          <path d="M19.07 4.93 L4.93 19.07" />
        </svg>
      </div>
      <h1>X-Dashboard</h1>
      <p>EA Trading Monitor</p>
    </div>

    <div class="cards">
      <div class="card server" onclick="openPage('server')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8" />
            <path d="M12 17v4" />
          </svg>
        </div>
        <div class="card-label">Server</div>
        <div class="card-title">Server Control</div>
        <div class="card-desc">จัดการ X-Server<br>MT5 Connections, EA Update</div>
        <div class="card-url">
          <span class="lock-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg></span>
          x-server.xea.dpdns.org
        </div>
      </div>

      <div class="card dashboard" onclick="openPage('dashboard')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 20V10" />
            <path d="M12 20V4" />
            <path d="M6 20v-6" />
          </svg>
        </div>
        <div class="card-label">Dashboard</div>
        <div class="card-title">EA Dashboard</div>
        <div class="card-desc">ข้อมูล EA, กราฟ P&L<br>Close Order, Settings</div>
        <div class="card-url">
          <span class="lock-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg></span>
          xea.dpdns.org
        </div>
      </div>
    </div>

    <div class="status-row">
      <div class="status-pill">
        <div class="dot"></div> Server Online
      </div>
      <div class="status-pill">
        <div class="dot"></div> Dashboard Online
      </div>
    </div>
  </div>

  <!-- Content iframe -->
  <iframe id="content-frame"></iframe>

  <!-- Bottom Bar -->
  <div class="bottombar">
    <span class="bottombar-status" id="bottom-status">เลือกเมนู</span>
    <div class="bottombar-actions">
      <button class="btn-bar" onclick="refreshPage()">⟳ Refresh</button>
      <button class="btn-bar" onclick="goHome()">◀ Home</button>
      <span class="ver-tag">v1.5.0</span>
    </div>
  </div>

  <script>
    let currentPage = '';

    const URLS = {
      server: 'https://x-server.xea.dpdns.org',
      dashboard: 'https://xea.dpdns.org'
    };
    const LABELS = { server: 'Server Control', dashboard: 'EA Dashboard' };

    function openPage(type) {
      currentPage = type;
      document.getElementById('content-frame').src = URLS[type];
      document.getElementById('content-frame').style.display = 'block';
      document.getElementById('main-page').style.display = 'none';
      document.getElementById('topbar-text').textContent = LABELS[type];
      document.getElementById('bottom-status').textContent = LABELS[type];
    }

    function refreshPage() {
      if (currentPage) { const f = document.getElementById('content-frame'); f.src = f.src; }
    }

    function goHome() {
      currentPage = '';
      document.getElementById('content-frame').style.display = 'none';
      document.getElementById('content-frame').src = '';
      document.getElementById('main-page').style.display = 'flex';
      document.getElementById('topbar-text').textContent = 'Dashboard';
      document.getElementById('bottom-status').textContent = 'เลือกเมนู';
    }

    document.addEventListener('keydown', (e) => {
      if (e.metaKey && e.key === 'r') { e.preventDefault(); refreshPage(); }
      if (e.key === 'Escape' && currentPage) { goHome(); }
    });
  </script>
</body>

</html>
