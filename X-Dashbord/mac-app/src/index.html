<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X-Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== Light Theme ===== */
    :root,
    [data-theme="light"] {
      --bg: #f0f2f5;
      --card: #ffffff;
      --card-border: rgba(0, 0, 0, 0.06);
      --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --card-hover: 0 6px 24px rgba(0, 0, 0, 0.1);
      --bar-bg: #ffffff;
      --green: #00c853;
      --green-bg: rgba(0, 200, 83, 0.08);
      --orange: #ff9100;
      --orange-bg: rgba(255, 145, 0, 0.08);
      --text: #1a1a2e;
      --text2: #6e6e80;
      --text3: #9e9eb0;
      --btn-bg: rgba(0, 0, 0, 0.04);
      --btn-border: rgba(0, 0, 0, 0.08);
      --btn-hover: rgba(0, 0, 0, 0.08);
      --icon-br-bg: rgba(0, 0, 0, 0.03);
      --icon-br-border: rgba(0, 0, 0, 0.06);
      --toggle-bg: rgba(0, 0, 0, 0.06);
    }

    /* ===== Dark Theme (Antigravity) ===== */
    [data-theme="dark"] {
      --bg: #0d0d1a;
      --card: #161628;
      --card-border: rgba(99, 102, 241, 0.12);
      --card-shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
      --card-hover: 0 8px 32px rgba(99, 102, 241, 0.1);
      --bar-bg: rgba(13, 13, 26, 0.95);
      --green: #22d3ee;
      --green-bg: rgba(34, 211, 238, 0.08);
      --orange: #a78bfa;
      --orange-bg: rgba(167, 139, 250, 0.08);
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --btn-bg: rgba(99, 102, 241, 0.08);
      --btn-border: rgba(99, 102, 241, 0.15);
      --btn-hover: rgba(99, 102, 241, 0.15);
      --icon-br-bg: rgba(99, 102, 241, 0.06);
      --icon-br-border: rgba(99, 102, 241, 0.12);
      --toggle-bg: rgba(99, 102, 241, 0.1);
    }

    body {
      font-family: 'Inter', 'Prompt', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    /* ===== Drag Region ===== */
    .drag-region {
      height: 28px;
      -webkit-app-region: drag;
      flex-shrink: 0;
      position: relative;
    }

    /* ===== Theme Toggle ===== */
    .theme-toggle {
      position: absolute;
      top: 6px;
      right: 12px;
      -webkit-app-region: no-drag;
      width: 44px;
      height: 22px;
      background: var(--toggle-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 2px;
      transition: all 0.3s;
    }

    .theme-toggle .toggle-knob {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      transform: translateX(0);
    }

    [data-theme="dark"] .theme-toggle .toggle-knob {
      transform: translateX(22px);
      background: #6366f1;
    }

    .toggle-knob svg {
      width: 11px;
      height: 11px;
      color: white;
    }

    /* ===== Main Content ===== */
    #main-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 40px 20px;
      -webkit-app-region: no-drag;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: var(--text2);
    }

    /* ===== Cards ===== */
    .cards {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 520px;
    }

    .card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      min-height: 140px;
      box-shadow: var(--card-shadow);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--card-hover);
    }

    .card:active {
      transform: translateY(-1px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .card-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .card.server .card-dot {
      background: var(--orange);
      box-shadow: 0 0 6px var(--orange);
    }

    .card.dashboard .card-dot {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .card-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
    }

    .card-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .card.server .card-title {
      color: var(--orange);
    }

    .card.dashboard .card-title {
      color: var(--green);
    }

    .card-desc {
      font-size: 11px;
      color: var(--text3);
    }

    .card-icon-br {
      position: absolute;
      bottom: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      background: var(--icon-br-bg);
      border: 1px solid var(--icon-br-border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon-br svg {
      width: 18px;
      height: 18px;
      color: var(--text3);
    }

    /* ===== Status ===== */
    .status-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text3);
      font-weight: 500;
    }

    .s-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 4px var(--green);
    }

    /* ===== Content Frame ===== */
    #content-frame {
      display: none;
      flex: 1;
      width: 100%;
      border: none;
    }

    /* ===== Bottom Bar ===== */
    .bottombar {
      height: 32px;
      background: var(--bar-bg);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 100;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      transition: background 0.3s;
    }

    .bar-status {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
    }

    .bar-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .bar-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 5px;
      color: var(--text2);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .bar-btn:hover {
      background: var(--btn-hover);
      color: var(--text);
    }

    .bar-btn svg {
      width: 12px;
      height: 12px;
    }

    .bar-ver {
      font-size: 10px;
      color: var(--text3);
    }

    /* ===== Animations ===== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      animation: fadeUp 0.3s ease-out;
    }

    .card:nth-child(1) {
      animation: fadeUp 0.3s ease-out 0.06s both;
    }

    .card:nth-child(2) {
      animation: fadeUp 0.3s ease-out 0.12s both;
    }
  </style>
</head>

<body>

  <!-- Drag Region + Theme Toggle -->
  <div class="drag-region">
    <div class="theme-toggle" onclick="toggleTheme()">
      <div class="toggle-knob">
        <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <circle cx="12" cy="12" r="5" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
        <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" style="display:none">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Main Page -->
  <div id="main-page">
    <div class="header">
      <h1>X-Dashboard</h1>
      <p>EA Trading Monitor</p>
    </div>

    <div class="cards">
      <div class="card server" onclick="openPage('server')">
        <div class="card-header">
          <div class="card-dot"></div>
          <span class="card-label">Server Control</span>
        </div>
        <div class="card-title">X-Server</div>
        <div class="card-desc">MT5, EA Update</div>
        <div class="card-icon-br">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8" />
            <path d="M12 17v4" />
          </svg>
        </div>
      </div>

      <div class="card dashboard" onclick="openPage('dashboard')">
        <div class="card-header">
          <div class="card-dot"></div>
          <span class="card-label">EA Dashboard</span>
        </div>
        <div class="card-title">Dashboard</div>
        <div class="card-desc">P&L, Orders, Settings</div>
        <div class="card-icon-br">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 20V10" />
            <path d="M12 20V4" />
            <path d="M6 20v-6" />
          </svg>
        </div>
      </div>
    </div>

    <div class="status-row">
      <div class="status-pill">
        <div class="s-dot"></div> Online
      </div>
      <div class="status-pill">v1.5.0</div>
    </div>
  </div>

  <!-- Content iframe -->
  <iframe id="content-frame"></iframe>

  <!-- Bottom Bar -->
  <div class="bottombar">
    <span class="bar-status" id="bottom-status">เลือกเมนู</span>
    <div class="bar-actions">
      <button class="bar-btn" onclick="refreshPage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M21.5 2v6h-6" />
          <path d="M2.5 22v-6h6" />
          <path d="M3.34 8.5A9.5 9.5 0 0121.5 8l.01.01" />
          <path d="M20.66 15.5A9.5 9.5 0 012.5 16l-.01-.01" />
        </svg>
        Refresh
      </button>
      <button class="bar-btn" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Home
      </button>
      <span class="bar-ver">v1.5.0</span>
    </div>
  </div>

  <script>
    let currentPage = '';

    const URLS = {
      server: 'https://x-server.xea.dpdns.org',
      dashboard: 'https://xea.dpdns.org'
    };
    const LABELS = { server: 'Server Control', dashboard: 'EA Dashboard' };

    function openPage(type) {
      currentPage = type;
      document.getElementById('content-frame').src = URLS[type];
      document.getElementById('content-frame').style.display = 'block';
      document.getElementById('main-page').style.display = 'none';
      document.getElementById('bottom-status').textContent = LABELS[type];
    }

    function refreshPage() {
      if (currentPage) { const f = document.getElementById('content-frame'); f.src = f.src; }
    }

    function goHome() {
      currentPage = '';
      document.getElementById('content-frame').style.display = 'none';
      document.getElementById('content-frame').src = '';
      document.getElementById('main-page').style.display = 'flex';
      document.getElementById('bottom-status').textContent = 'เลือกเมนู';
    }

    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('x-theme', isDark ? 'light' : 'dark');
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.getElementById('theme-icon-sun').style.display = isDark ? 'none' : 'block';
      document.getElementById('theme-icon-moon').style.display = isDark ? 'block' : 'none';
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('x-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeIcon();

    document.addEventListener('keydown', (e) => {
      if (e.metaKey && e.key === 'r') { e.preventDefault(); refreshPage(); }
      if (e.key === 'Escape' && currentPage) { goHome(); }
    });
  </script>
</body>

</html>
