<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X-Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1a1a2e;
      --card: #252540;
      --card-border: rgba(255, 255, 255, 0.06);
      --green: #00e676;
      --orange: #ff9100;
      --text: #ffffff;
      --text2: #8e8ea0;
      --text3: #5a5a6e;
    }

    body {
      font-family: 'Inter', 'Prompt', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Drag Region (invisible) ===== */
    .drag-region {
      height: 28px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    /* ===== Main Content ===== */
    #main-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 40px 20px;
      -webkit-app-region: no-drag;
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: var(--text2);
      font-weight: 400;
    }

    /* ===== Cards ===== */
    .cards {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 520px;
    }

    .card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      min-height: 140px;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .card:active {
      transform: translateY(-1px);
    }

    /* Card top: dot + label */
    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .card-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .card.server .card-dot {
      background: var(--orange);
      box-shadow: 0 0 6px var(--orange);
    }

    .card.dashboard .card-dot {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .card-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
    }

    /* Card main text */
    .card-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .card.server .card-title {
      color: var(--text2);
    }

    .card.dashboard .card-title {
      color: var(--green);
    }

    .card-desc {
      font-size: 11px;
      color: var(--text3);
      font-weight: 400;
    }

    /* Card bottom-right icon */
    .card-icon-br {
      position: absolute;
      bottom: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon-br svg {
      width: 18px;
      height: 18px;
      color: var(--text3);
    }

    /* ===== Status ===== */
    .status-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text3);
      font-weight: 500;
    }

    .s-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 4px var(--green);
    }

    /* ===== Content Frame ===== */
    #content-frame {
      display: none;
      flex: 1;
      width: 100%;
      border: none;
      background: var(--bg);
    }

    /* ===== Bottom Bar ===== */
    .bottombar {
      height: 32px;
      background: rgba(20, 20, 36, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 100;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .bar-status {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
    }

    .bar-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .bar-btn {
      padding: 3px 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 5px;
      color: var(--text2);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .bar-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .bar-ver {
      font-size: 10px;
      color: var(--text3);
    }

    /* ===== Animations ===== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      animation: fadeUp 0.3s ease-out;
    }

    .card:nth-child(1) {
      animation: fadeUp 0.3s ease-out 0.06s both;
    }

    .card:nth-child(2) {
      animation: fadeUp 0.3s ease-out 0.12s both;
    }
  </style>
</head>

<body>

  <!-- Drag Region -->
  <div class="drag-region"></div>

  <!-- Main Page -->
  <div id="main-page">
    <div class="header">
      <h1>X-Dashboard</h1>
      <p>EA Trading Monitor</p>
    </div>

    <div class="cards">
      <!-- Server Card -->
      <div class="card server" onclick="openPage('server')">
        <div class="card-header">
          <div class="card-dot"></div>
          <span class="card-label">Server Control</span>
        </div>
        <div class="card-title">X-Server</div>
        <div class="card-desc">MT5, EA Update</div>
        <div class="card-icon-br">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8" />
            <path d="M12 17v4" />
          </svg>
        </div>
      </div>

      <!-- Dashboard Card -->
      <div class="card dashboard" onclick="openPage('dashboard')">
        <div class="card-header">
          <div class="card-dot"></div>
          <span class="card-label">EA Dashboard</span>
        </div>
        <div class="card-title">Dashboard</div>
        <div class="card-desc">P&L, Orders, Settings</div>
        <div class="card-icon-br">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 20V10" />
            <path d="M12 20V4" />
            <path d="M6 20v-6" />
          </svg>
        </div>
      </div>
    </div>

    <div class="status-row">
      <div class="status-pill">
        <div class="s-dot"></div> Online
      </div>
      <div class="status-pill">v1.5.0</div>
    </div>
  </div>

  <!-- Content iframe -->
  <iframe id="content-frame"></iframe>

  <!-- Bottom Bar -->
  <div class="bottombar">
    <span class="bar-status" id="bottom-status">เลือกเมนู</span>
    <div class="bar-actions">
      <button class="bar-btn" onclick="refreshPage()">⟳ Refresh</button>
      <button class="bar-btn" onclick="goHome()">◀ Home</button>
      <span class="bar-ver">v1.5.0</span>
    </div>
  </div>

  <script>
    let currentPage = '';

    const URLS = {
      server: 'https://x-server.xea.dpdns.org',
      dashboard: 'https://xea.dpdns.org'
    };
    const LABELS = { server: 'Server Control', dashboard: 'EA Dashboard' };

    function openPage(type) {
      currentPage = type;
      document.getElementById('content-frame').src = URLS[type];
      document.getElementById('content-frame').style.display = 'block';
      document.getElementById('main-page').style.display = 'none';
      document.getElementById('bottom-status').textContent = LABELS[type];
    }

    function refreshPage() {
      if (currentPage) { const f = document.getElementById('content-frame'); f.src = f.src; }
    }

    function goHome() {
      currentPage = '';
      document.getElementById('content-frame').style.display = 'none';
      document.getElementById('content-frame').src = '';
      document.getElementById('main-page').style.display = 'flex';
      document.getElementById('bottom-status').textContent = 'เลือกเมนู';
    }

    document.addEventListener('keydown', (e) => {
      if (e.metaKey && e.key === 'r') { e.preventDefault(); refreshPage(); }
      if (e.key === 'Escape' && currentPage) { goHome(); }
    });
  </script>
</body>

</html>
