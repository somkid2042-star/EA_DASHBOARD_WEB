name: Release Tauri App

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri App
        working-directory: ./SimpleDashboard
        run: tauri build

      - name: List build output
        run: |
          Get-ChildItem -Recurse SimpleDashboard/src-tauri/target/release/bundle/ -Filter *.exe
          Get-ChildItem -Recurse SimpleDashboard/src-tauri/target/release/bundle/ -Filter *.msi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EA_Dashboard_Windows
          path: |
            SimpleDashboard/src-tauri/target/release/bundle/nsis/*.exe
            SimpleDashboard/src-tauri/target/release/bundle/msi/*.msi
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.1.1"
          name: "EA Smart Dashboard v1.1.1 (Tauri)"
          body: |
            🚀 **EA Smart Dashboard — Tauri Edition**
            
            Ultra-lightweight Windows desktop app (~3MB).
            Built with Rust backend for maximum performance.
            Includes WebView2 auto-installer.
            
            **Downloads:**
            - `ea-dashboard-web_1.1.1_x64-setup.exe` — Windows Installer (recommended)
            - `ea-dashboard-web_1.1.1_x64_en-US.msi` — MSI Installer
          files: |
            SimpleDashboard/src-tauri/target/release/bundle/nsis/*.exe
            SimpleDashboard/src-tauri/target/release/bundle/msi/*.msi
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
