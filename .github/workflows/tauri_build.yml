name: Release X-Server

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server
        working-directory: ./X-Dashbord/ea-server
        run: cargo build --release

      - name: Rename Binary
        working-directory: ./X-Dashbord/ea-server
        run: Rename-Item -Path "target\release\x-server.exe" -NewName "X-Server_v1.0.0.exe"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: X-Server_Windows
          path: X-Dashbord/ea-server/target/release/X-Server_v1.0.0.exe
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "X-Server-v1.0.0"
          name: "X-Server v1.0.0 (Native Edition)"
          body: |
            🚀 **X-Server — Native Edition**
            
            Ultra-lightweight Windows desktop server app.
            - Displays a native GUI Control Panel (Status, MT5 Connections, Logs)
            - Embeds the full Web Dashboard (accessible via mobile at port 3000)
            - Includes Cloudflare Tunnel checks and automatic installation.
            
            **Downloads:**
            - `X-Server_v1.0.0.exe` — Standalone Executable (No installation required)
          files: X-Dashbord/ea-server/target/release/X-Server_v1.0.0.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
