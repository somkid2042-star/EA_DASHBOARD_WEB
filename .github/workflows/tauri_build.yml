name: Release X-Server

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== MQ5 Compilation (Custom Robust Script) =====
      - name: Install MT5 and Compile MQ5
        run: |
          Write-Host "Downloading MetaTrader 5..."
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile "mt5setup.exe"
          Write-Host "Installing MetaTrader 5 silently..."
          Start-Process -FilePath ".\mt5setup.exe" -ArgumentList "/auto" -Wait
          Start-Sleep -Seconds 45
          
          # Find Terminal and MetaEditor
          $mt5Dir = "C:\Program Files\MetaTrader 5"
          if (-not (Test-Path $mt5Dir)) {
             $mt5Dir = (Get-ChildItem -Path "C:\Program Files" -Filter "terminal64.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).DirectoryName
          }
          if (-not $mt5Dir) { Write-Error "MT5 not found!"; exit 1 }
          
          $terminal = Join-Path $mt5Dir "terminal64.exe"
          $metaeditor = Join-Path $mt5Dir "metaeditor64.exe"
          Write-Host "Found Terminal: $terminal"
          Write-Host "Found MetaEditor: $metaeditor"
          
          # Run Terminal once to initialize MQL5 Standard Library (Trade.mqh etc.)
          Write-Host "Initializing MT5 Platform..."
          Start-Process -FilePath $terminal -ArgumentList "/portable"
          Start-Sleep -Seconds 30
          Stop-Process -Name "terminal64" -Force -ErrorAction SilentlyContinue
          
          # Verify Include Directory
          $mql5Dir = Join-Path $mt5Dir "MQL5"
          $includeDir = $mql5Dir
          if (-not (Test-Path (Join-Path $mql5Dir "Include\Trade\Trade.mqh"))) {
             Write-Host "⚠️ Trade.mqh not found in $mql5Dir\Include! Trying APPDATA..."
             $appDataMql5 = Get-ChildItem -Path "$env:APPDATA\MetaQuotes\Terminal" -Filter "Trade.mqh" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
             if ($appDataMql5) {
                $includeDir = $appDataMql5.Directory.Parent.Parent.FullName
                Write-Host "Found MQL5 dir in APPDATA: $includeDir"
             } else {
                Write-Error "CRITICAL: MQL5 Standard Library (Trade.mqh) could not be initialized."
                exit 1
             }
          } else {
             Write-Host "✅ Trade.mqh initialized successfully at $mql5Dir\Include"
          }
          
          # Compile EAs
          Write-Host "Compiling EAs..."
          $eaFiles = @("X_Grid.mq5", "X_BTC.mq5", "X_XAU.mq5")
          $allSuccess = $true
          
          foreach ($ea in $eaFiles) {
            $mq5Path = Resolve-Path $ea
            Write-Host "Compiling $ea..."
            $argList = @("/compile:""$mq5Path""", "/log", "/inc:""$includeDir""")
            Write-Host "Arguments: $argList"
            Start-Process -FilePath $metaeditor -ArgumentList $argList -Wait -NoNewWindow
            Start-Sleep -Seconds 5
            
            $ex5Path = [System.IO.Path]::ChangeExtension($mq5Path, ".ex5")
            if (Test-Path $ex5Path) {
              $fileSize = (Get-Item $ex5Path).Length
              Write-Host "✅ $ea compiled successfully ($fileSize bytes)"
            } else {
              Write-Host "❌ Compilation failed for $ea!"
              $logPath = [System.IO.Path]::ChangeExtension($mq5Path, ".log")
              if (Test-Path $logPath) { Get-Content $logPath }
              $allSuccess = $false
            }
          }
          
          if (-not $allSuccess) { exit 1 }

      - name: Verify compiled EA files
        run: |
          $eaFiles = @("X_Grid.ex5", "X_BTC.ex5", "X_XAU.ex5")
          $allFound = $true
          foreach ($ea in $eaFiles) {
            $found = Get-ChildItem -Path . -Filter $ea -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $fileSize = $found.Length
              Write-Host "✅ $ea found: $($found.FullName) ($fileSize bytes)"
              # Copy to workspace root if not already there
              if ($found.DirectoryName -ne (Get-Location).Path) {
                Copy-Item $found.FullName . -Force
              }
            } else {
              Write-Error "❌ $ea not found!"
              $allFound = $false
            }
          }
          if (-not $allFound) { exit 1 }

      # ===== Rust Server Build =====
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server
        working-directory: ./X-Dashbord/ea-server
        run: cargo build --release

      - name: Get Version
        id: get_version
        working-directory: ./X-Dashbord/ea-server
        run: |
          $ver = (Get-Content Cargo.toml | Select-String -Pattern '^version\s*=\s*"(.*)"').Matches.Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Rename Binary
        working-directory: ./X-Dashbord/ea-server
        run: Rename-Item -Path "target\release\x-server.exe" -NewName "X-Server_v${{ env.VERSION }}.exe"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: X-Server_Windows
          path: |
            X-Dashbord/ea-server/target/release/X-Server_v${{ env.VERSION }}.exe
            X_Grid.ex5
            X_BTC.ex5
            X_XAU.ex5
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "X-Server v${{ env.VERSION }} (Native Edition)"
          body: |
            🚀 **X-Server — Native Edition**
            
            Ultra-lightweight Windows desktop server app.
            - Displays a native GUI Control Panel (Status, MT5 Connections, Logs)
            - Embeds the full Web Dashboard (accessible via mobile at port 3000)
            - Includes Cloudflare Tunnel checks and automatic installation.
            - **Auto-Updater Included**
            
            **Downloads:**
            - `X-Server_v${{ env.VERSION }}.exe` — Standalone Executable (No installation required)
            - `X_Grid.ex5` — Smart Grid EA (General Symbols)
            - `X_BTC.ex5` — BTC Momentum + RSI Pullback EA
            - `X_XAU.ex5` — XAU Smart Trend EA
          files: |
            X-Dashbord/ea-server/target/release/X-Server_v${{ env.VERSION }}.exe
            X_Grid.ex5
            X_BTC.ex5
            X_XAU.ex5
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
