name: Release X-Server

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== MQ5 Compilation =====
      - name: Download MetaTrader 5
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile "mt5setup.exe"
          Start-Process -FilePath ".\mt5setup.exe" -ArgumentList "/auto" -Wait
          # Wait for installation to complete
          Start-Sleep -Seconds 30

      - name: Find MetaEditor and Compile MQ5
        run: |
          # Find metaeditor64.exe
          $metaeditor = Get-ChildItem -Path "C:\Program Files" -Filter "metaeditor64.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $metaeditor) {
            $metaeditor = Get-ChildItem -Path "$env:APPDATA" -Filter "metaeditor64.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $metaeditor) {
            $metaeditor = Get-ChildItem -Path "C:\" -Filter "metaeditor64.exe" -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $metaeditor) {
            Write-Error "metaeditor64.exe not found!"
            exit 1
          }
          Write-Host "Found MetaEditor at: $($metaeditor.FullName)"
          
          # Find the terminal data folder that has MQL5/Include (where Trade.mqh lives)
          $terminalBase = "$env:APPDATA\MetaQuotes\Terminal"
          $mql5Experts = $null
          $includeDir = $null
          
          if (Test-Path $terminalBase) {
            Get-ChildItem -Path $terminalBase -Directory | ForEach-Object {
              $testInclude = Join-Path $_.FullName "MQL5\Include"
              $testExperts = Join-Path $_.FullName "MQL5\Experts"
              Write-Host "Checking: $($_.FullName) -> Include exists: $(Test-Path $testInclude)"
              if ((Test-Path $testInclude) -and (-not $mql5Experts)) {
                $mql5Experts = $testExperts
                $includeDir = $testInclude
              }
            }
          }
          
          # Fallback: use the MT5 installation dir itself
          if (-not $mql5Experts) {
            $mt5InstallDir = $metaeditor.Directory.Parent.FullName
            $testExperts = Join-Path $mt5InstallDir "MQL5\Experts"
            $testInclude = Join-Path $mt5InstallDir "MQL5\Include"
            Write-Host "Fallback MT5 dir: $mt5InstallDir -> Include exists: $(Test-Path $testInclude)"
            if (Test-Path $testInclude) {
              $mql5Experts = $testExperts
              $includeDir = $testInclude
            }
          }
          
          if (-not $mql5Experts) {
            Write-Error "Could not find MQL5 directory with Include folder!"
            exit 1
          }
          
          if (-not (Test-Path $mql5Experts)) {
            New-Item -ItemType Directory -Path $mql5Experts -Force | Out-Null
          }
          Write-Host "MQL5 Experts dir: $mql5Experts"
          Write-Host "MQL5 Include dir: $includeDir"
          
          # Verify Trade.mqh exists
          $tradeMqh = Join-Path $includeDir "Trade\Trade.mqh"
          Write-Host "Trade.mqh exists: $(Test-Path $tradeMqh)"
          
          # Copy MQ5 files to the terminal's MQL5/Experts/
          $eaFiles = @("X_Grid.mq5", "X_BTC.mq5", "X_XAU.mq5")
          foreach ($ea in $eaFiles) {
            Copy-Item $ea $mql5Experts -Force
            Write-Host "Copied $ea to $mql5Experts"
          }
          
          # Compile all 3 EA files
          $allSuccess = $true
          foreach ($ea in $eaFiles) {
            $mq5Path = Join-Path $mql5Experts $ea
            Write-Host "Compiling: $mq5Path"
            & $metaeditor.FullName /compile:"$mq5Path" /log /inc:"$(Split-Path $includeDir -Parent)"
            Start-Sleep -Seconds 15
            
            $ex5Name = [System.IO.Path]::ChangeExtension($ea, ".ex5")
            $ex5Path = Join-Path $mql5Experts $ex5Name
            if (Test-Path $ex5Path) {
              $fileSize = (Get-Item $ex5Path).Length
              Write-Host "✅ $ea compiled successfully ($fileSize bytes)"
              Copy-Item $ex5Path . -Force
            } else {
              Write-Host "⚠️ Checking log for $ea..."
              $logPath = Join-Path $mql5Experts ([System.IO.Path]::ChangeExtension($ea, ".log"))
              if (Test-Path $logPath) { Get-Content $logPath }
              Write-Error "❌ Compilation failed for $ea!"
              $allSuccess = $false
            }
          }
          
          if (-not $allSuccess) { exit 1 }

      # ===== Rust Server Build =====
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server
        working-directory: ./X-Dashbord/ea-server
        run: cargo build --release

      - name: Get Version
        id: get_version
        working-directory: ./X-Dashbord/ea-server
        run: |
          $ver = (Get-Content Cargo.toml | Select-String -Pattern '^version\s*=\s*"(.*)"').Matches.Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Rename Binary
        working-directory: ./X-Dashbord/ea-server
        run: Rename-Item -Path "target\release\x-server.exe" -NewName "X-Server_v${{ env.VERSION }}.exe"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: X-Server_Windows
          path: |
            X-Dashbord/ea-server/target/release/X-Server_v${{ env.VERSION }}.exe
            X_Grid.ex5
            X_BTC.ex5
            X_XAU.ex5
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "X-Server v${{ env.VERSION }} (Native Edition)"
          body: |
            🚀 **X-Server — Native Edition**
            
            Ultra-lightweight Windows desktop server app.
            - Displays a native GUI Control Panel (Status, MT5 Connections, Logs)
            - Embeds the full Web Dashboard (accessible via mobile at port 3000)
            - Includes Cloudflare Tunnel checks and automatic installation.
            - **Auto-Updater Included**
            
            **Downloads:**
            - `X-Server_v${{ env.VERSION }}.exe` — Standalone Executable (No installation required)
            - `X_Grid.ex5` — Smart Grid EA (General Symbols)
            - `X_BTC.ex5` — BTC Momentum + RSI Pullback EA
            - `X_XAU.ex5` — XAU Smart Trend EA
          files: |
            X-Dashbord/ea-server/target/release/X-Server_v${{ env.VERSION }}.exe
            X_Grid.ex5
            X_BTC.ex5
            X_XAU.ex5
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
