name: Release EA Server

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server
        working-directory: ./SimpleDashboard/ea-server
        run: cargo build --release

      - name: Rename Binary
        working-directory: ./SimpleDashboard/ea-server
        run: Rename-Item -Path "target\release\ea-server.exe" -NewName "EA_Smart_Server_v1.2.0.exe"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EA_Smart_Server_Windows
          path: SimpleDashboard/ea-server/target/release/EA_Smart_Server_v1.2.0.exe
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.2.0"
          name: "EA Smart Server v1.2.0 (Native Control Panel)"
          body: |
            🚀 **EA Smart Server — Native Edition**
            
            Ultra-lightweight Windows desktop server app.
            - Displays a native GUI Control Panel (Status, MT5 Connections, Logs)
            - Embeds the full Web Dashboard (accessible via mobile at port 3000)
            - Replaces the old Node.js and Tauri versions with a single standalone `.exe` file.
            
            **Downloads:**
            - `EA_Smart_Server_v1.2.0.exe` — Standalone Executable (No installation required)
          files: SimpleDashboard/ea-server/target/release/EA_Smart_Server_v1.2.0.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
